name: finance_app
description: "Um aplicativo Flutter completo para gerenciar finanças pessoais com autenticação Firebase."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.0  # se estiver usando
  provider: ^6.0.0
  intl: ^0.19.0
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
 

flutter:
  uses-material-design: true